<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DirectWa</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Header -->
    <div class="bg-green-500 text-white p-4 text-center font-bold text-xl">
        DirectWa
    </div>

    <!-- Main Form -->
    <div class="max-w-md mx-auto p-4 mt-4 space-y-4">
        
        <div class="bg-white rounded-2xl shadow-lg p-6">
            <h2 class="text-lg font-bold text-center mb-4">Send WhatsApp Message</h2>
            
            <!-- Country Code -->
            <div class="mb-3">
                <label class="block text-sm font-semibold mb-1">Country Code</label>
                <input type="text" id="code" value="+234" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-center font-bold">
            </div>
            
            <!-- Phone -->
            <div class="mb-3">
                <label class="block text-sm font-semibold mb-1">Phone Number</label>
                <input type="tel" id="phone" placeholder="7033143508" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl">
            </div>
            
            <!-- Message -->
            <div class="mb-4">
                <label class="block text-sm font-semibold mb-1">Message (Optional)</label>
                <textarea id="msg" rows="2" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl"></textarea>
            </div>
            
            <!-- START CHAT BUTTON -->
            <button id="startBtn" class="w-full bg-green-600 text-white font-bold py-4 rounded-xl text-lg mb-3">
                 START CHAT
            </button>
            
            <!-- Copy & QR Buttons -->
            <div class="grid grid-cols-2 gap-3 mb-3">
                <button id="copyBtn" class="bg-blue-500 text-white font-semibold py-3 rounded-xl">
                    📋 Copy Link
                </button>
                <button id="qrBtn" class="bg-purple-500 text-white font-semibold py-3 rounded-xl">                     QR Code
                </button>
            </div>
            
            <!-- Business Card Button -->
            <button id="cardBtn" class="w-full bg-gradient-to-r from-green-500 to-teal-600 text-white font-bold py-3 rounded-xl">
                📇 Create Business Card
            </button>
        </div>

        <!-- QR Modal -->
        <div id="qrModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl p-6 max-w-sm w-full text-center">
                <h3 class="text-xl font-bold mb-4">Scan QR Code</h3>
                <div id="qrcode" class="flex justify-center mb-4"></div>
                <button onclick="document.getElementById('qrModal').classList.add('hidden')" class="w-full bg-gray-200 py-2 rounded-xl">Close</button>
            </div>
        </div>

        <!-- Ad -->
        <div class="bg-white rounded-xl p-2 text-center">
            <script>
                atOptions = {
                    'key' : '90fd5bebbb6299ffe5d07b8a539064d0',
                    'format' : 'iframe',
                    'height' : 50,
                    'width' : 320,
                    'params' : {}
                };
            </script>
            <script src="https://www.highperformanceformat.com/90fd5bebbb6299ffe5d07b8a539064d0/invoke.js"></script>
        </div>
    </div>

    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <!-- Main Script -->
    <script>
        // Wait for page to load
        document.addEventListener('DOMContentLoaded', function() {
            console.log('✅ Page loaded!');
            
            // START CHAT BUTTON
            document.getElementById('startBtn').addEventListener('click', function() {
                console.log('Start Chat clicked!');
                
                var code = document.getElementById('code').value.replace(/[^0-9+]/g, '');
                var phone = document.getElementById('phone').value.replace(/[^0-9]/g, '');
                var msg = document.getElementById('msg').value;                
                if (!phone) {
                    alert('Please enter a phone number!');
                    return;
                }
                
                var url = 'https://wa.me/' + code + phone;
                if (msg) {
                    url += '?text=' + encodeURIComponent(msg);
                }
                
                console.log('Opening:', url);
                window.open(url, '_blank');
            });
            
            // COPY LINK BUTTON
            document.getElementById('copyBtn').addEventListener('click', function() {
                console.log('Copy Link clicked!');
                
                var code = document.getElementById('code').value.replace(/[^0-9+]/g, '');
                var phone = document.getElementById('phone').value.replace(/[^0-9]/g, '');
                var msg = document.getElementById('msg').value;
                
                if (!phone) {
                    alert('Please enter a phone number!');
                    return;
                }
                
                var url = 'https://wa.me/' + code + phone;
                if (msg) {
                    url += '?text=' + encodeURIComponent(msg);
                }
                
                // Copy to clipboard
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(url).then(function() {
                        alert('✅ Link copied!');
                    }).catch(function() {
                        fallbackCopy(url);
                    });
                } else {
                    fallbackCopy(url);
                }
            });
            
            // QR CODE BUTTON
            document.getElementById('qrBtn').addEventListener('click', function() {
                console.log('QR Code clicked!');
                
                var code = document.getElementById('code').value.replace(/[^0-9+]/g, '');                var phone = document.getElementById('phone').value.replace(/[^0-9]/g, '');
                var msg = document.getElementById('msg').value;
                
                if (!phone) {
                    alert('Please enter a phone number!');
                    return;
                }
                
                var url = 'https://wa.me/' + code + phone;
                if (msg) {
                    url += '?text=' + encodeURIComponent(msg);
                }
                
                // Clear and generate QR
                document.getElementById('qrcode').innerHTML = '';
                
                setTimeout(function() {
                    new QRCode(document.getElementById('qrcode'), {
                        text: url,
                        width: 200,
                        height: 200
                    });
                    document.getElementById('qrModal').classList.remove('hidden');
                }, 100);
            });
            
            // BUSINESS CARD BUTTON
            document.getElementById('cardBtn').addEventListener('click', function() {
                console.log('Business Card clicked!');
                window.location.href = 'card.html';
            });
            
            // Fallback copy function
            function fallbackCopy(text) {
                var textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    alert('✅ Link copied!');
                } catch (err) {
                    alert('Copy manually: ' + text);
                }
                document.body.removeChild(textArea);
            }
        });
    </script>
</body>
</html>
