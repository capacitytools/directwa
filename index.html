<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DirectWa - Send WhatsApp Without Saving Number</title>
    <!-- Tailwind CSS via CDN (The world's simplest framework for rapid UI) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom WhatsApp Green Colors */
        .wa-green { background-color: #25D366; }
        .wa-green-hover:hover { background-color: #128C7E; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center justify-center p-4 font-sans antialiased">
    
    <!-- Main Card Container -->
    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl shadow-green-500/10 p-8 space-y-6">
        
        <!-- Header / Logo Section -->
        <div class="text-center space-y-3">
            <!-- The "DW" Logo (Built with CSS for instant loading) -->
            <div class="w-16 h-16 mx-auto bg-gradient-to-br from-green-400 to-green-600 rounded-2xl flex items-center justify-center shadow-lg shadow-green-500/30">
                <span class="text-white font-extrabold text-2xl tracking-tight">DW</span>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">DirectWa</h1>
            <p class="text-gray-500 text-sm">Message anyone on WhatsApp without saving their number.</p>
        </div>

        <!-- The Form -->
        <form id="waForm" class="space-y-4">
            <!-- Country Code & Phone Number Row -->
            <div class="flex space-x-3">
                <div class="w-1/3">
                    <label class="block text-xs font-semibold text-gray-600 mb-1.5 uppercase tracking-wide">Code</label>
                    <input type="text" id="countryCode" value="+1" class="w-full px-3 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition text-gray-800 font-medium">
                </div>
                <div class="w-2/3">
                    <label class="block text-xs font-semibold text-gray-600 mb-1.5 uppercase tracking-wide">Phone Number</label>
                    <input type="tel" id="phoneNumber" placeholder="123 456 7890" class="w-full px-3 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition text-gray-800 font-medium" required>
                </div>
            </div>

            <!-- Message Area -->
            <div>
                <label class="block text-xs font-semibold text-gray-600 mb-1.5 uppercase tracking-wide">Message (Optional)</label>
                <textarea id="message" rows="2" placeholder="Hi, I'm contacting you about..." class="w-full px-3 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition text-gray-800 resize-none"></textarea>
            </div>

            <!-- Start Chat Button -->
            <button type="submit" class="w-full wa-green wa-green-hover text-white font-bold py-4 rounded-xl shadow-lg shadow-green-500/30 transition-all duration-200 active:scale-95 flex items-center justify-center space-x-2 mt-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/>
                </svg>
                <span>Start Chat</span>
            </button>
        </form>
        
        <!-- Footer -->
        <div class="text-center text-xs text-gray-400 pt-2">
            Fast, Free & Secure. Not affiliated with WhatsApp Inc.
        </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        document.getElementById('waForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // 1. Get user inputs and remove any spaces or symbols
            let code = document.getElementById('countryCode').value.replace(/\D/g, ''); 
            let phone = document.getElementById('phoneNumber').value.replace(/\D/g, ''); 
            let message = document.getElementById('message').value;
            
            // 2. Basic validation
            if (!phone) {
                alert('Please enter a valid phone number.');
                return;
            }
            
            // 3. Construct the official WhatsApp URL
            let url = `https://wa.me/${code}${phone}`;
            if (message) {
                url += `?text=${encodeURIComponent(message)}`;
            }
            
            // 4. ACTION: Open WhatsApp
            // NOTE: Later, we will replace this line with the Adsterra Direct Link!
            window.open(url, '_blank');
        });
    </script>
</body>
</html>
