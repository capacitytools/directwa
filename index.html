<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#25D366">
    <title>DirectWa - WhatsApp Direct Message</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        .wa-green { background-color: #25D366; }
        .wa-green:hover { background-color: #128C7E; }
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 50px;
            padding: 16px;
            position: fixed;
            z-index: 100;
            left: 50%;
            bottom: 80px;
            transform: translateX(-50%);
            font-size: 15px;
        }
        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 80px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 80px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-20">

    <!-- Header -->
    <div class="wa-green text-white p-4 text-center font-bold text-xl shadow-lg">
        DirectWa
    </div>

    <!-- Main Form -->
    <div class="max-w-md mx-auto p-4 mt-4 space-y-4">
        
        <div class="bg-white rounded-2xl shadow-lg p-6">
            <h2 class="text-lg font-bold text-center mb-4">Send WhatsApp Message</h2>
            
            <!-- Country Code -->
            <div class="mb-3">                <label class="block text-sm font-semibold mb-1">Country Code</label>
                <input type="text" id="code" value="+234" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-center font-bold">
            </div>
            
            <!-- Country Selector -->
            <div class="mb-3">
                <label class="block text-sm font-semibold mb-1">Or Select Country:</label>
                <select id="countrySelect" onchange="updateCountryCode()" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl">
                    <option value="">-- Select --</option>
                    <option value="+1">🇺 USA (+1)</option>
                    <option value="+44">🇬🇧 UK (+44)</option>
                    <option value="+234" selected>🇳 Nigeria (+234)</option>
                    <option value="+91">🇮 India (+91)</option>
                    <option value="+254">🇰🇪 Kenya (+254)</option>
                    <option value="+27">🇿🇦 South Africa (+27)</option>
                    <option value="+233">🇬🇭 Ghana (+233)</option>
                    <option value="+256">🇺🇬 Uganda (+256)</option>
                    <option value="+255">🇹🇿 Tanzania (+255)</option>
                    <option value="+237">🇨🇲 Cameroon (+237)</option>
                </select>
            </div>
            
            <!-- Phone -->
            <div class="mb-3">
                <label class="block text-sm font-semibold mb-1">Phone Number</label>
                <input type="tel" id="phone" placeholder="7033143508" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl">
            </div>
            
            <!-- Message -->
            <div class="mb-4">
                <label class="block text-sm font-semibold mb-1">Message (Optional)</label>
                <textarea id="msg" rows="2" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl"></textarea>
            </div>
            
            <!-- START CHAT BUTTON -->
            <button onclick="startChat()" class="w-full wa-green text-white font-bold py-4 rounded-xl text-lg mb-3">
                 START CHAT
            </button>
            
            <!-- Copy & QR Buttons -->
            <div class="grid grid-cols-2 gap-3 mb-3">
                <button onclick="copyLink()" class="bg-blue-500 text-white font-semibold py-3 rounded-xl">
                    📋 Copy Link
                </button>
                <button onclick="showQR()" class="bg-purple-500 text-white font-semibold py-3 rounded-xl">
                     QR Code
                </button>
            </div>
            
            <!-- Shareable Link Button -->            <button onclick="createShareableLink()" class="w-full bg-gradient-to-r from-orange-500 to-pink-500 text-white font-bold py-4 rounded-xl mb-2">
                🔗 Create Shareable Link
            </button>
        </div>

        <!-- QR Modal -->
        <div id="qrModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl p-6 max-w-sm w-full text-center">
                <h3 class="text-xl font-bold mb-4">Scan QR Code</h3>
                <div id="qrcode" class="flex justify-center mb-4"></div>
                <button onclick="closeQR()" class="w-full bg-gray-200 py-2 rounded-xl">Close</button>
            </div>
        </div>

        <!-- Shareable Link Modal -->
        <div id="shareModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl p-6 max-w-sm w-full space-y-4">
                <h3 class="text-xl font-bold text-center">Your Shareable Link</h3>
                
                <!-- Direct Link -->
                <div class="bg-gray-100 p-3 rounded-xl">
                    <p class="text-xs text-gray-500 mb-1">Direct Link:</p>
                    <input type="text" id="directLink" readonly class="w-full bg-transparent text-xs outline-none break-all">
                </div>
                
                <div class="flex space-x-2">
                    <button onclick="copyDirectLink()" class="flex-1 bg-green-500 text-white py-2 rounded-xl">📋 Copy</button>
                    <button onclick="closeShareModal()" class="flex-1 bg-gray-200 py-2 rounded-xl">Close</button>
                </div>
                
                <!-- Shrink Button -->
                <button onclick="shrinkLink()" id="shrinkBtn" class="w-full bg-purple-500 text-white font-semibold py-3 rounded-xl">
                    🔗 Shrink Link (Earn Money)
                </button>
                
                <!-- Shortened Link Section -->
                <div id="shortenedSection" class="hidden space-y-3">
                    <div class="bg-green-50 border-2 border-green-500 p-3 rounded-xl">
                        <p class="text-xs text-green-700 font-bold mb-1">💰 Monetized Link:</p>
                        <input type="text" id="shortenedLink" readonly class="w-full bg-white text-xs outline-none break-all font-mono">
                    </div>
                    
                    <button onclick="copyShortenedLink()" class="w-full bg-green-500 text-white font-bold py-3 rounded-xl">
                        📋 Copy Shortened Link
                    </button>
                    
                    <div class="text-center">
                        <p class="text-xs text-gray-500 mb-2">QR Code:</p>
                        <div id="shortenedQR" class="flex justify-center"></div>
                    </div>                    
                    <div class="bg-blue-50 p-3 rounded-xl">
                        <p class="text-xs text-blue-700 text-center">💡 Earn money when people click!</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Ad -->
        <div class="bg-white rounded-xl p-2 text-center">
            <script>
                atOptions = {
                    'key' : '90fd5bebbb6299ffe5d07b8a539064d0',
                    'format' : 'iframe',
                    'height' : 50,
                    'width' : 320,
                    'params' : {}
                };
            </script>
            <script src="https://www.highperformanceformat.com/90fd5bebbb6299ffe5d07b8a539064d0/invoke.js"></script>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast">Copied!</div>

    <!-- Main Script -->
    <script>
        let currentURL = '';
        
        function updateCountryCode() {
            var select = document.getElementById('countrySelect');
            var input = document.getElementById('code');
            if (select.value) {
                input.value = select.value;
                showToast('Country code updated!');
            }
        }
        
        function startChat() {
            var code = document.getElementById('code').value.replace(/[^0-9+]/g, '');
            var phone = document.getElementById('phone').value.replace(/[^0-9]/g, '');
            var msg = document.getElementById('msg').value;
            
            if (!phone) {
                alert('Please enter a phone number!');
                return;
            }
            
            var url = 'https://wa.me/' + code + phone;            if (msg) {
                url += '?text=' + encodeURIComponent(msg);
            }
            
            window.open(url, '_blank');
        }
        
        function copyLink() {
            var code = document.getElementById('code').value.replace(/[^0-9+]/g, '');
            var phone = document.getElementById('phone').value.replace(/[^0-9]/g, '');
            var msg = document.getElementById('msg').value;
            
            if (!phone) {
                alert('Please enter a phone number!');
                return;
            }
            
            var url = 'https://wa.me/' + code + phone;
            if (msg) {
                url += '?text=' + encodeURIComponent(msg);
            }
            
            // Copy
            var tempInput = document.createElement('input');
            tempInput.value = url;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand('copy');
            document.body.removeChild(tempInput);
            
            showToast('✅ Link copied!');
        }
        
        function showQR() {
            var code = document.getElementById('code').value.replace(/[^0-9+]/g, '');
            var phone = document.getElementById('phone').value.replace(/[^0-9]/g, '');
            var msg = document.getElementById('msg').value;
            
            if (!phone) {
                alert('Please enter a phone number!');
                return;
            }
            
            var url = 'https://wa.me/' + code + phone;
            if (msg) {
                url += '?text=' + encodeURIComponent(msg);
            }
            
            document.getElementById('qrcode').innerHTML = '';
            setTimeout(function() {                new QRCode(document.getElementById('qrcode'), {
                    text: url,
                    width: 200,
                    height: 200
                });
                document.getElementById('qrModal').classList.remove('hidden');
            }, 100);
        }
        
        function closeQR() {
            document.getElementById('qrModal').classList.add('hidden');
        }
        
        function createShareableLink() {
            var code = document.getElementById('code').value.replace(/[^0-9+]/g, '');
            var phone = document.getElementById('phone').value.replace(/[^0-9]/g, '');
            var msg = document.getElementById('msg').value;
            
            if (!phone) {
                alert('Please enter a phone number!');
                return;
            }
            
            currentURL = 'https://wa.me/' + code + phone;
            if (msg) {
                currentURL += '?text=' + encodeURIComponent(msg);
            }
            
            document.getElementById('directLink').value = currentURL;
            document.getElementById('shareModal').classList.remove('hidden');
            document.getElementById('shortenedSection').classList.add('hidden');
            document.getElementById('shrinkBtn').style.display = 'block';
        }
        
        function copyDirectLink() {
            var input = document.getElementById('directLink');
            input.select();
            document.execCommand('copy');
            showToast('✅ Link copied!');
        }
        
        function shrinkLink() {
            var btn = document.getElementById('shrinkBtn');
            btn.innerHTML = '⏳ Shortening...';
            btn.disabled = true;
            
            var apiKey = '8b061096284143bace60e6b73ff7081c57dc0325';
            var apiUrl = 'https://shrinkme.io/api?api=' + apiKey + '&url=' + encodeURIComponent(currentURL) + '&format=text';
            
            fetch(apiUrl)                .then(response => response.text())
                .then(shortenedURL => {
                    if (shortenedURL && shortenedURL.includes('shrinkme.io')) {
                        document.getElementById('shortenedLink').value = shortenedURL;
                        document.getElementById('shortenedSection').classList.remove('hidden');
                        document.getElementById('shrinkBtn').style.display = 'none';
                        
                        // Generate QR for shortened link
                        document.getElementById('shortenedQR').innerHTML = '';
                        new QRCode(document.getElementById('shortenedQR'), {
                            text: shortenedURL,
                            width: 100,
                            height: 100
                        });
                    } else {
                        alert('Error shortening link');
                        btn.innerHTML = '🔗 Shrink Link (Earn Money)';
                        btn.disabled = false;
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Error connecting to ShrinkMe.io');
                    btn.innerHTML = '🔗 Shrink Link (Earn Money)';
                    btn.disabled = false;
                });
        }
        
        function copyShortenedLink() {
            var input = document.getElementById('shortenedLink');
            input.select();
            document.execCommand('copy');
            showToast('✅ Shortened link copied! Share to earn! 💰');
        }
        
        function closeShareModal() {
            document.getElementById('shareModal').classList.add('hidden');
        }
        
        function showToast(message) {
            var toast = document.getElementById("toast");
            toast.textContent = message;
            toast.className = "show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        }
    </script>
</body>
</html>
