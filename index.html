<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#25D366">
    <title>DirectWa - WhatsApp Direct Message</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .wa-green { background-color: #25D366; }
        .wa-green:hover { background-color: #128C7E; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Top Bar -->
    <div class="wa-green text-white p-4 text-center font-bold text-xl shadow-lg">
        DirectWa
    </div>

    <!-- Main Content -->
    <div class="max-w-md mx-auto p-4 mt-4">
        
        <!-- Input Card -->
        <div class="bg-white rounded-2xl shadow-lg p-6 space-y-4">
            
            <h2 class="text-lg font-bold text-gray-800 text-center">Send WhatsApp Message</h2>
            
            <!-- Country Code -->
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Country Code</label>
                <input type="text" id="code" value="+1" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-green-500 outline-none text-center font-bold">
            </div>
            
            <!-- Phone Number -->
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Phone Number</label>
                <input type="tel" id="phone" placeholder="1234567890" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-green-500 outline-none">
            </div>
            
            <!-- Message -->
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Message (Optional)</label>
                <textarea id="msg" rows="2" placeholder="Hi there..." class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-green-500 outline-none resize-none"></textarea>
            </div>
            
            <!-- START CHAT Button -->
            <button onclick="startChat()" class="w-full wa-green text-white font-bold py-4 rounded-xl shadow-lg text-lg">
                 START CHAT
            </button>            
            <!-- Other Buttons -->
            <div class="grid grid-cols-2 gap-3 pt-2">
                <button onclick="copyLink()" class="bg-blue-500 text-white font-semibold py-3 rounded-xl hover:bg-blue-600">
                    📋 Copy Link
                </button>
                <button onclick="showQR()" class="bg-purple-500 text-white font-semibold py-3 rounded-xl hover:bg-purple-600">
                     QR Code
                </button>
            </div>
            
            <button onclick="goToBusinessCard()" class="w-full bg-gradient-to-r from-green-500 to-teal-600 text-white font-bold py-3 rounded-xl shadow-lg mt-2">
                📇 Create Business Card
            </button>
        </div>

        <!-- QR Code Modal -->
        <div id="qrModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4" onclick="closeQR(event)">
            <div class="bg-white rounded-2xl p-6 max-w-sm w-full text-center" onclick="event.stopPropagation()">
                <h3 class="text-xl font-bold mb-4">Scan QR Code</h3>
                <div id="qrcode" class="flex justify-center mb-4"></div>
                <button onclick="closeQR()" class="w-full bg-gray-200 text-gray-800 font-semibold py-2 rounded-xl">Close</button>
            </div>
        </div>

        <!-- Ad Space -->
        <div class="mt-6 bg-white rounded-xl p-4 text-center">
            <p class="text-xs text-gray-500 mb-2">Advertisement</p>
            <!-- ADSTERRA NATIVE -->
            <div id="container-31f16fc7913263f00e93a85356f6e7d6"></div>
            <script async src="https://pl29820186.effectivecpmnetwork.com/31f16fc7913263f00e93a85356f6e7d6/invoke.js"></script>
        </div>

        <!-- Bottom Ad -->
        <div class="mt-4 bg-white rounded-xl p-2 text-center fixed bottom-0 left-0 right-0 max-w-md mx-auto shadow-lg">
            <script>
                atOptions = {
                    'key' : '90fd5bebbb6299ffe5d07b8a539064d0',
                    'format' : 'iframe',
                    'height' : 50,
                    'width' : 320,
                    'params' : {}
                };
            </script>
            <script src="https://www.highperformanceformat.com/90fd5bebbb6299ffe5d07b8a539064d0/invoke.js"></script>
        </div>
        
        <div class="h-20"></div>
    </div>
    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <!-- Main JavaScript -->
    <script>
        // TEST: Check if JavaScript is working
        console.log("✅ JavaScript is working!");
        alert("✅ Page loaded successfully! Buttons should work now.");
        
        // START CHAT FUNCTION
        function startChat() {
            console.log("Start Chat clicked!");
            
            var code = document.getElementById('code').value.replace(/[^0-9+]/g, '');
            var phone = document.getElementById('phone').value.replace(/[^0-9]/g, '');
            var msg = document.getElementById('msg').value;
            
            if (!phone) {
                alert('❌ Please enter a phone number!');
                return;
            }
            
            var url = 'https://wa.me/' + code + phone;
            if (msg) {
                url += '?text=' + encodeURIComponent(msg);
            }
            
            console.log("Opening:", url);
            window.open(url, '_blank');
        }
        
        // COPY LINK FUNCTION
        function copyLink() {
            console.log("Copy Link clicked!");
            
            var code = document.getElementById('code').value.replace(/[^0-9+]/g, '');
            var phone = document.getElementById('phone').value.replace(/[^0-9]/g, '');
            var msg = document.getElementById('msg').value;
            
            if (!phone) {
                alert('❌ Please enter a phone number!');
                return;
            }
            
            var url = 'https://wa.me/' + code + phone;
            if (msg) {
                url += '?text=' + encodeURIComponent(msg);
            }
            
            // Copy to clipboard            if (navigator.clipboard) {
                navigator.clipboard.writeText(url).then(function() {
                    alert('✅ Link copied to clipboard!');
                }, function() {
                    fallbackCopy(url);
                });
            } else {
                fallbackCopy(url);
            }
        }
        
        // Fallback copy function
        function fallbackCopy(text) {
            var textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                alert('✅ Link copied!');
            } catch (err) {
                alert('❌ Failed to copy. Please copy manually: ' + text);
            }
            document.body.removeChild(textArea);
        }
        
        // SHOW QR CODE
        function showQR() {
            console.log("Show QR clicked!");
            
            var code = document.getElementById('code').value.replace(/[^0-9+]/g, '');
            var phone = document.getElementById('phone').value.replace(/[^0-9]/g, '');
            var msg = document.getElementById('msg').value;
            
            if (!phone) {
                alert('❌ Please enter a phone number!');
                return;
            }
            
            var url = 'https://wa.me/' + code + phone;
            if (msg) {
                url += '?text=' + encodeURIComponent(msg);
            }
            
            // Clear previous QR
            document.getElementById('qrcode').innerHTML = '';
            
            // Generate new QR
            setTimeout(function() {
                new QRCode(document.getElementById('qrcode'), {                    text: url,
                    width: 200,
                    height: 200
                });
                document.getElementById('qrModal').classList.remove('hidden');
            }, 100);
        }
        
        // CLOSE QR
        function closeQR(event) {
            if (!event || event.target.id === 'qrModal') {
                document.getElementById('qrModal').classList.add('hidden');
            }
        }
        
        // GO TO BUSINESS CARD
        function goToBusinessCard() {
            console.log("Going to business card page");
            window.location.href = 'card.html';
        }
    </script>
</body>
</html>
