<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-gradient-to-br from-green-400 to-green-600 rounded-3xl shadow-2xl p-8 text-white text-center">
        <div class="text-6xl mb-4">👤</div>
        <h1 id="name" class="text-3xl font-bold mb-2">Loading...</h1>
        <p id="phone" class="text-xl mb-6"></p>
        
        <a id="waBtn" href="#" class="inline-block bg-white text-green-600 font-bold py-3 px-8 rounded-xl shadow-lg">
            💬 Chat on WhatsApp
        </a>
        
        <div class="mt-6 pt-6 border-t border-white/30">
            <p class="text-sm text-green-100">Powered by DirectWa</p>
        </div>
    </div>

    <script>
        // Get data from URL
        var hash = window.location.hash.substring(1);
        if (hash) {
            try {
                var data = JSON.parse(atob(hash));
                document.getElementById('name').textContent = data.name;
                document.getElementById('phone').textContent = '+' + data.phone;
                
                var waURL = 'https://wa.me/' + data.phone + '?text=Hi ' + data.name;
                document.getElementById('waBtn').href = waURL;
            } catch(e) {
                document.getElementById('name').textContent = 'Invalid Card';
            }
        } else {
            document.getElementById('name').textContent = 'No Data';
            document.getElementById('phone').textContent = 'Please use a valid card link';
        }
    </script>
</body>
</html>
